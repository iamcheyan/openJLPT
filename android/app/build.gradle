plugins {
    id 'com.android.application'
}

android {
    namespace 'com.jlptdrill.app'
    compileSdk 33

    defaultConfig {
        applicationId "com.jlptdrill.app"
        minSdk 21
        targetSdk 33
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

// 编译前自动同步 Web 文件到 assets
task syncWebAssets(type: Copy) {
    from('../../') {
        include 'index.html'
        include 'assets/**'
        include 'manifest.json'
        exclude 'assets/libs/kuromoji.js'  // libs 体积大，单独管理
    }
    into 'src/main/assets'
    // 确保每次编译都是最新的
    outputs.upToDateWhen { false }
}

tasks.configureEach { task ->
    if (task.name.startsWith('merge') && task.name.endsWith('Assets')) {
        task.dependsOn syncWebAssets
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
