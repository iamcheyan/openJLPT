name: Build Android APK

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug
          cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/openjlpt-latest.apk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: openjlpt-debug-apk
          path: android/app/build/outputs/apk/debug/openjlpt-latest.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Development Build
          body: |
            This is an automated build of the latest master branch.
            
            **APK Download:** [openjlpt-latest.apk](https://github.com/${{ github.repository }}/releases/download/latest/openjlpt-latest.apk)
          files: android/app/build/outputs/apk/debug/openjlpt-latest.apk
          prerelease: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
