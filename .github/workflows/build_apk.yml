name: Build Android APK

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Prepare Web Assets
        run: |
          mkdir -p android/app/src/main/assets
          # 拷贝 assets 目录下的内容到安卓资源目录下的 assets 子目录
          cp -r assets android/app/src/main/assets/
          # 拷贝入口 HTML 并重命名为 index.html
          cp template/exam_base.html android/app/src/main/assets/index.html
          # 拷贝清单文件
          cp manifest.json android/app/src/main/assets/
          # 清理不必要的大文件以减小 APK 体积
          rm -rf android/app/src/main/assets/assets/libs/dict/*.gz

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug
          cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/openjlpt-latest.apk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: openjlpt-debug-apk
          path: android/app/build/outputs/apk/debug/openjlpt-latest.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Development Build
          body: |
            This is an automated build of the latest master branch.
            
            **APK Download:** [openjlpt-latest.apk](https://github.com/${{ github.repository }}/releases/download/latest/openjlpt-latest.apk)
          files: android/app/build/outputs/apk/debug/openjlpt-latest.apk
          prerelease: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
